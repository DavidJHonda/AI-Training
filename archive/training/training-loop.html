<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px; height: 900px; overflow: hidden;
    background: #f6f5fb;
    display: flex; align-items: center; justify-content: center;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
  }
  .card {
    background: #fff; border-radius: 28px;
    box-shadow: 0 16px 44px rgba(14,10,31,0.05);
    padding: 96px 110px 76px;
  }
  .row { display: flex; align-items: center; gap: 44px; }
  .pill {
    background: #252a33; color: #fff;
    border-radius: 999px;
    padding: 36px 68px;
    font-size: 56px; font-weight: 800; letter-spacing: 0.04em;
  }
  .arrow { font-size: 68px; font-weight: 700; color: #5b3df5; }
  svg { display: block; margin: 18px auto 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="pill">GUESS</div>
      <div class="arrow">&#8594;</div>
      <div class="pill">CHECK</div>
      <div class="arrow">&#8594;</div>
      <div class="pill">NUDGE</div>
    </div>
    <svg width="1080" height="150" viewBox="0 0 1080 150">
      <path d="M 1020 10 C 1020 122, 60 122, 60 44" fill="none" stroke="#5b3df5" stroke-width="8" stroke-linecap="round"/>
      <polygon points="60,8 42,48 78,48" fill="#5b3df5"/>
    </svg>
  </div>
</body>
</html>
