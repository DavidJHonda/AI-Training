<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px; height: 900px; overflow: hidden;
    background: #f0eff5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
  }
  .pill {
    background: #252a33; color: #fff;
    border-radius: 999px;
    padding: 44px 88px;
    font-size: 62px; font-weight: 800; letter-spacing: -0.02em;
  }
  .sticky {
    margin-top: 64px;
    background: #f9eda6; color: #4a4426;
    transform: rotate(-2.5deg);
    padding: 30px 64px;
    font-size: 40px; font-weight: 600; font-style: italic;
    box-shadow: 0 10px 24px rgba(14,10,31,0.10);
  }
</style>
</head>
<body>
  <div class="pill">The finished model is a snapshot.</div>
  <div class="sticky">That&rsquo;s why models have knowledge cutoffs.</div>
</body>
</html>
